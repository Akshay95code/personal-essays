<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Akshay Sharma</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Georgia', serif;
      background-color: #fafaf8;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 80px 24px;
    }

    .container {
      max-width: 680px;
      width: 100%;
    }

    h1 {
      font-family: 'Georgia', serif;
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 48px;
      color: #0d0d0d;
    }

    .divider {
      width: 40px;
      height: 2px;
      background-color: #d0cec9;
      margin-bottom: 48px;
    }

    .section-label {
      font-size: 0.75rem;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #888;
      margin-bottom: 28px;
    }

    .essay-list {
      list-style: none;
    }

    .essay-list li {
      margin-bottom: 20px;
    }

    .essay-list a {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      text-decoration: none;
      color: inherit;
      gap: 24px;
    }

    .essay-list a:hover .essay-list-title {
      color: #000;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .essay-list-title {
      font-size: 1.05rem;
      color: #2c2c2c;
      line-height: 1.5;
    }

    .essay-list-date {
      font-size: 0.75rem;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      color: #aaa;
      white-space: nowrap;
      letter-spacing: 0.5px;
    }

    footer {
      margin-top: 64px;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      font-size: 0.78rem;
      color: #aaa;
      letter-spacing: 0.5px;
    }

    /* Dark mode toggle */
    #theme-toggle {
      position: fixed;
      top: 28px;
      right: 28px;
      background: none;
      border: 1px solid #d0cec9;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color 0.2s ease, opacity 0.2s ease, transform 0.15s ease;
      opacity: 0.5;
      padding: 0;
    }

    #theme-toggle:hover {
      border-color: #999;
      opacity: 1;
    }

    #theme-toggle:active {
      transform: scale(0.85);
    }

    #theme-toggle svg {
      width: 16px;
      height: 16px;
      stroke: #888;
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: stroke 0.2s ease;
    }

    /* Dark mode overrides */
    body.dark {
      background-color: #111110;
      color: #e8e6e1;
    }

    body.dark h1 {
      color: #f0ede8;
    }

    body.dark .divider {
      background-color: #2e2d2b;
    }

    body.dark .essay-list-title {
      color: #c8c5bf;
    }

    body.dark .essay-list a:hover .essay-list-title {
      color: #f0ede8;
    }

    body.dark footer {
      color: #555;
    }

    body.dark #theme-toggle {
      border-color: #2e2d2b;
    }

    body.dark #theme-toggle:hover {
      border-color: #555;
    }

    body.dark #theme-toggle svg {
      stroke: #666;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Akshay Sharma</h1>
    <div class="divider"></div>

    <p class="section-label">Essays</p>

    <ul class="essay-list">
      <li>
        <a href="one-shot-race.html">
          <span class="essay-list-title">The One-Shot Race</span>
          <span class="essay-list-date">May 2026</span>
        </a>
      </li>
      <li>
        <a href="the-proximity-advantage.html">
          <span class="essay-list-title">The Proximity Advantage</span>
          <span class="essay-list-date">April 2026</span>
        </a>
      </li>
      <li>
        <a href="who-gets-to-build.html">
          <span class="essay-list-title">Who Gets to Build</span>
          <span class="essay-list-date">March 2026</span>
        </a>
      </li>
      <li>
        <a href="vibe-coding-2041.html">
          <span class="essay-list-title">Vibe Coding, 2041</span>
          <span class="essay-list-date">February 2026</span>
        </a>
      </li>
      <li>
        <a href="the-empty-whiteboard.html">
          <span class="essay-list-title">The Empty Whiteboard</span>
          <span class="essay-list-date">January 2026</span>
        </a>
      </li>
    </ul>

    <footer>Akshay Sharma, Applied AI Product Manager</footer>
  </div>
  <button id="theme-toggle" aria-label="Toggle dark mode"></button>

  <script>
    const toggle = document.getElementById('theme-toggle');
    const body = document.body;

    const sunIcon = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <circle cx="12" cy="12" r="4"/>
      <line x1="12" y1="2" x2="12" y2="5"/>
      <line x1="12" y1="19" x2="12" y2="22"/>
      <line x1="2" y1="12" x2="5" y2="12"/>
      <line x1="19" y1="12" x2="22" y2="12"/>
      <line x1="4.22" y1="4.22" x2="6.34" y2="6.34"/>
      <line x1="17.66" y1="17.66" x2="19.78" y2="19.78"/>
      <line x1="19.78" y1="4.22" x2="17.66" y2="6.34"/>
      <line x1="6.34" y1="17.66" x2="4.22" y2="19.78"/>
    </svg>`;

    const moonIcon = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>`;

    function setTheme(dark) {
      if (dark) {
        body.classList.add('dark');
        toggle.innerHTML = sunIcon;
        localStorage.setItem('theme', 'dark');
      } else {
        body.classList.remove('dark');
        toggle.innerHTML = moonIcon;
        localStorage.setItem('theme', 'light');
      }
    }

    setTheme(localStorage.getItem('theme') === 'dark');

    toggle.addEventListener('click', () => {
      setTheme(!body.classList.contains('dark'));
    });
  </script>
</body>
</html>
